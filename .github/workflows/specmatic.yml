name: Specmatic Contract Tests

on:
push:
branches:
- main
pull_request:

jobs:
contract-tests:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Verify Repository Structure
    run: |
      pwd
      ls -la
      find . -maxdepth 3 -type f

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.13"

  - name: Install Dependencies
    working-directory: backend
    run: |
      pip install -r requirements.txt

  - name: Start FastAPI Server
    working-directory: backend
    run: |
      nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
      sleep 15

  - name: Run Specmatic Tests
    uses: znsio/specmatic-github-action@v1
    with:
      spec-file-path: openapi/expense-sharing-api.yaml
      base-url: http://host.docker.internal:8000

  - name: Upload Specmatic Reports
    uses: actions/upload-artifact@v4
    if: always()
    with:
      name: specmatic-report
      path: build/reports/specmatic/
```
