name: Specmatic Contract Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Start FastAPI
        run: |
          cd backend
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          sleep 20

      - name: Verify API
        run: |
          curl http://localhost:8000/docs || true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Specmatic
        run: |
          wget https://repo1.maven.org/maven2/io/specmatic/specmatic-executable/latest/specmatic-executable-latest.jar -O specmatic.jar

      - name: Run Specmatic
        run: |
          java -jar specmatic.jar test

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: backend/server.log
