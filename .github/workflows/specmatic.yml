name: Specmatic Contract Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Start FastAPI server
        run: |
          cd backend
          nohup uvicorn main:app --host 0.0.0.0 --port 9000 > server.log 2>&1 &
          sleep 15

      - name: Verify server is running
        run: |
          curl http://localhost:9000/expenses || true

      - name: Run Specmatic tests
        run: |
          docker run --network host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            specmatic/specmatic:latest test \
            --host http://localhost:9000 \
            openapi/expense-sharing-api.yaml

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-report
          path: build/reports/specmatic
